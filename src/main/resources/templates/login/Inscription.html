<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org" class="form-screen">
<head>
  <meta charset="utf-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Inscription</title>

  <!-- Tailwind is included -->
  <link rel="stylesheet" href="/dist/css/main.css?v=1628755089081">

  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'UA-130795909-1');
  </script>

</head>
<body>

<div id="app">

  <section class="section main-section">
    <div class="card">
      <header class="card-header">
        <p class="card-header-title">
          <span class="icon"><i class="mdi mdi-lock"></i></span>
          Inscription
        </p>
      </header>
      <div class="card-content">
        <form action="/inscription" method="POST" th:object="${registerDTO}">
          <input th:name="${_csrf.parameterName}" th:value="${_csrf.token}" type="hidden"/>

          <div class="field spaced">
            <label class="label">email</label>
            <div class="control icons-left">
              <input class="input" type="email" name="email" id="email" placeholder="user@example.com" autocomplete="email" th:field="${registerDTO.email}">
              <span class="icon is-small left"><i class="mdi mdi-account"></i></span>
            </div>
            <p class="help">
              Entrer votre email
            </p>
          </div>

          <div class="field spaced">
            <label class="label">mot de passe</label>
            <p class="control icons-left">
              <input class="input" type="password" name="password" id="password" placeholder="Mot de passe" autocomplete="current-password" th:field="${registerDTO.password}">
              <span class="icon is-small left"><i class="mdi mdi-asterisk"></i></span>
            </p>
            <p class="help">
              Entrer votre mot de passe
            </p>
          </div>

          <div class="field spaced">
            <label class="label">Confirm</label>
            <p class="control icons-left">
              <input class="input" type="password" name="confirm" id="confirm" placeholder="Confirme" autocomplete="current-password" th:field="${registerDTO.confirm}">
              <span class="icon is-small left"><i class="mdi mdi-asterisk"></i></span>
            </p>
            <p class="help">
              Confirmer votre mot de passe
            </p>
          </div>

          <hr>

          <div class="field grouped">
            <div class="control">
              <button type="submit" class="button blue">
                connexion
              </button>
            </div>
            <div class="control">
              <a href="index.html" class="button">
                retour
              </a>
            </div>
          </div>

        </form>
      </div>
    </div>

  </section>


</div>
